name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python API
        run: flake8 api/ --max-line-length=120 --exclude=api/tests
      - name: Lint Python Worker
        run: flake8 worker/ --max-line-length=120
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: cd frontend && npm install
      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js
      - name: Lint Dockerfile API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
      - name: Lint Dockerfile Worker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
      - name: Lint Dockerfile Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov httpx
      - name: Run unit tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Build and push API
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
      - name: Build and push Worker
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
      - name: Build and push Frontend
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend
      - name: Scan API with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          limit-severities-for-sarif: true
      - name: Scan Worker with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          limit-severities-for-sarif: true
      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
          scanners: vuln
          limit-severities-for-sarif: true
      - name: Upload Trivy SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env
      - name: Start full stack
        run: docker compose up --build -d
      - name: Wait for frontend health
        run: |
          for i in $(seq 1 18); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Frontend healthy after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Frontend never became healthy"
              docker compose logs
              exit 1
            fi
            echo "Attempt $i/18 - retrying in 5s..."
            sleep 5
          done
      - name: Submit a job
        id: submit_job
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
      - name: Poll until completed
        run: |
          JOB_ID="${{ steps.submit_job.outputs.job_id }}"
          for i in $(seq 1 24); do
            STATUS=$(curl -sf "http://localhost:3000/status/$JOB_ID" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i - status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 5
          done
          echo "Job did not complete within 120s"
          docker compose logs
          exit 1
      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Rolling deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "Deploy secrets not configured - skipping deploy"
            exit 0
          fi
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' << 'ENDSSH'
          set -e
          cd /app/hng14-stage2-devops
          git pull origin main
          rolling_update() {
            local SVC="$1"
            echo "==> Rolling update: $SVC"
            docker compose up -d --no-deps --build "$SVC"
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format="{{.State.Health.Status}}" "$(docker compose ps -q "$SVC" | head -1)" 2>/dev/null || echo "unknown")
              echo "Health check $i/12: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "$SVC is healthy."
                return 0
              fi
              sleep 5
            done
            echo "ERROR: $SVC failed health check within 60s"
            return 1
          }
          rolling_update api && rolling_update worker && rolling_update frontend
          echo "Deploy complete."
          ENDSSH
          rm -f /tmp/deploy_key
